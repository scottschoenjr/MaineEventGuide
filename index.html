<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f1e8" />
  <title>Family Field Guide</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Wedding weekend</p>
      <h1>Family Field Guide</h1>
      <p class="subtitle">Names, faces, relationships, and conversation starters.</p>
    </div>
    <button id="refreshButton" class="ghost-button" type="button" aria-label="Refresh people">↻</button>
  </header>

  <main>
    <section class="controls" aria-label="Search and filters">
      <label class="search-label" for="searchInput">Search people</label>
      <input id="searchInput" type="search" placeholder="Try: cousin, Seattle, loves dogs…" autocomplete="off" />
      <div id="filterChips" class="chips" role="list" aria-label="Family filters"></div>
    </section>

    <section class="stats" aria-live="polite">
      <span id="resultCount">0 people</span>
      <span id="dataSourceStatus">Using built-in sample data</span>
    </section>

    <section id="peopleGrid" class="people-grid" aria-label="Family members"></section>
  </main>

  <dialog id="personDialog" class="person-dialog" aria-labelledby="dialogName">
    <button id="closeDialog" class="close-button" type="button" aria-label="Close">×</button>
    <div id="dialogContent"></div>
  </dialog>

  <template id="personCardTemplate">
    <article class="person-card" tabindex="0">
      <div class="card-topline">
        <div class="avatar" aria-hidden="true"></div>
        <div>
          <h2 class="person-name"></h2>
          <p class="person-relationship"></p>
        </div>
      </div>
      <p class="person-bio"></p>
      <div class="tag-row"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
